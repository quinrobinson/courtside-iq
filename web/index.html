<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    Alternatively, build your application passing the --base-href parameter
    specifying the new root path of your web app.

    Fore more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Courtside IQ">

  

  <meta name="robots" content="noindex" />

  <!-- Favicon -->
  <link rel="icon" href="favicon-light.svg" sizes="any"/>
  

  <!-- Open Graph & SEO tags -->
  <meta property="og:title" content="Courtside IQ — Basketball Stat Tracker for AAU, Youth & High School Players " />
  <meta property="og:description" content="Track basketball stats in real time with Courtside IQ. Built for AAU, high school, and youth players, parents, and coaches. Log points, rebounds, assists, and more — game by game, season by season. Free on iOS and Android." />
  <meta property="og:image" content="/assets/assets/images/App_Icon_z.png" /> 
  <meta name="twitter:title" content="Courtside IQ — Basketball Stat Tracker for AAU, Youth & High School Players " />
  <meta name="twitter:description" content="Track basketball stats in real time with Courtside IQ. Built for AAU, high school, and youth players, parents, and coaches. Log points, rebounds, assists, and more — game by game, season by season. Free on iOS and Android." />
  <meta name="twitter:image" content="/assets/assets/images/App_Icon_z.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title> Courtside IQ — Basketball Stat Tracker for AAU, Youth & High School Players  </title>
  <meta name="description" content="Track basketball stats in real time with Courtside IQ. Built for AAU, high school, and youth players, parents, and coaches. Log points, rebounds, assists, and more — game by game, season by season. Free on iOS and Android." />
    

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f4f8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#f1f4f8">

  <link rel="manifest" href="manifest.json">
  
</head>

  <script>

  </script>
</body>
</html>
